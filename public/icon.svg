<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="#0f0f13"/>

  <!-- Upward trending line chart - the "gains" -->
  <path
    d="M 80 380 L 150 340 L 220 280 L 290 310 L 360 220 L 430 120"
    stroke="#06b6d4"
    stroke-width="32"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Glow effect circle at the peak -->
  <circle cx="430" cy="120" r="24" fill="#06b6d4" opacity="0.3"/>
  <circle cx="430" cy="120" r="12" fill="#06b6d4"/>
</svg>
